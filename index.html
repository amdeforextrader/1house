<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini Game Hub</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav>
    <a href="index.html" class="logo">MiniGameHub</a>
    <a href="about.html">About</a>
    <a href="settings.html">Settings</a>
  </nav>
  <main>
    <h1>Welcome to MiniGameHub</h1>
    <div class="games-grid" id="games-list">
      <!-- Games inserted here by scripts.js -->
    </div>
  </main>
  <script src="scripts.js"></script>
  <script>
  // Apply saved theme on page load (excluding settings.html, which has its own script)
  if(!window.location.pathname.endsWith("settings.html")) {
    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark-mode");
    }
  }
</script>
</body>
</html>
